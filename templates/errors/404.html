{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>404 - Page Not Found | Placement Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
     <link rel="stylesheet" href="{% static 'css/error.css' %}">

</head>
<body>
  <div class="error-shell">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-card page-enter" id="errorCard">
      <div class="error-content">
        <section class="error-main">
          <div class="badge-label">
            <span class="rounded-circle d-inline-flex align-items-center justify-content-center" style="width:22px;height:22px;background:rgba(20,184,166,0.12);">
              <i class="fas fa-route" style="color:#14b8a6;"></i>
            </span>
            <span>Placement Portal</span>
          </div>

          <div class="error-code">404</div>
          <h1 class="error-title">Oops! The page you’re looking for doesn’t exist.</h1>
          <p class="error-subtitle">
            It might have been moved, removed, or the URL may be incorrect. Let’s get you back to a safe place.
          </p>

          <button class="btn-gradient" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
            Back to Home
          </button>
        </section>

        <aside class="error-illustration" aria-hidden="true">
          <div class="planet-wrap">
            <div class="planet-orbit">
              <div class="planet-dot"></div>
            </div>
            <div class="ghost-traces"></div>
            <div class="planet-face">
              <i class="fas fa-compass"></i>
              <span style="font-size:0.85rem;opacity:0.85;">Lost in placements?</span>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>

    <script src="{% static 'js/error.js' %}"></script>

</body>
</html>
