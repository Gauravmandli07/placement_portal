{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>403 - Access Denied | Placement Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
     <link rel="stylesheet" href="{% static 'css/error.css' %}">

</head>
<body>
  <div class="error-shell">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-card page-enter" id="errorCard">
      <div class="error-content">
        <section class="error-main">
          <div class="badge-label">
            <i class="fas fa-shield-alt" style="color:#14b8a6;"></i>
            <span>Access control</span>
          </div>

          <div class="error-code">403</div>
          <h1 class="error-title">You don’t have permission to access this page.</h1>
          <p class="error-subtitle">
            Your account doesn’t have the required privileges to view this resource. Try going back to your dashboard or logging in with a different account.
          </p>

          <div class="actions">
            <button class="btn-gradient" onclick="window.location.href='student-dashboard.html'">
              <i class="fas fa-gauge"></i>
              Go to Dashboard
            </button>
            <button class="btn-outline-soft" onclick="window.location.href='student-login.html'">
              <i class="fas fa-right-to-bracket"></i>
              Login as Different User
            </button>
          </div>
        </section>

        <aside class="error-illustration" aria-hidden="true">
          <div class="shield-wrap">
            <div class="shield-inner">
              <i class="fas fa-lock"></i>
              <span class="shield-tag">Restricted area</span>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>
    <script src="{% static 'js/error.js' %}"></script>

</body>
</html>
