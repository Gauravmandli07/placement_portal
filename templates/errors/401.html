{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>401 - Unauthorized | Placement Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
     <link rel="stylesheet" href="{% static 'css/error.css' %}">


</head>
<body>
  <div class="shell">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card-glass page-enter" id="errorCard">
      <div class="badge-label">
        <i class="fas fa-user-lock" style="color:#14b8a6;"></i>
        <span>Authentication required</span>
      </div>

      <div class="error-code">401</div>
      <h1 class="error-title">Please login to continue.</h1>
      <p class="error-subtitle">
        Your session has expired or you haven’t logged in yet. Sign in to access your student dashboard and placement updates.
      </p>

      <button class="btn-gradient" onclick="window.location.href='student-login.html'">
        <i class="fas fa-right-to-bracket"></i>
        Login Now
      </button>

      <div class="login-illustration" aria-hidden="true">
        <div class="circle">
          <i class="fas fa-id-card-clip"></i>
        </div>
      </div>
    </div>
  </div>

    <script src="{% static 'js/error.js' %}"></script>

</body>
</html>
